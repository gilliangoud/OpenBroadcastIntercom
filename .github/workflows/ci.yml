name: CI

on:
  pull_request:
  push:
    branches: [main, next]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Verify formatting
        run: cargo fmt --all -- --check
      - name: Check generated artifacts
        run: tools/check-generated-artifacts.sh
      - name: Check public secrets
        run: tools/check-public-secrets.sh
      - name: Check version sync
        run: tools/check-version-sync.sh
      - name: Check external model manifest
        run: python3 tools/check-model-manifest.py
      - name: Test release version tool
        run: python3 -m unittest tools/test_release_version.py
      - name: Test client core
        run: cargo test -p client-core
      - name: Test desktop client
        run: cargo test -p desktop
      - name: Test app shell
        run: cargo test -p app
      - name: Test server without optional engines
        run: cargo test -p server --no-default-features
      - name: Test server app shell
        run: cargo test -p server-app

  ios-check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - name: Check macOS server app accelerated features
        run: cargo check -p server-app --features native
      - name: Check iOS simulator Rust target
        run: cargo check -p app --features native --target aarch64-apple-ios-sim
