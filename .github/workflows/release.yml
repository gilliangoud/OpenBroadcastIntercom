name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  TAURI_CLI_VERSION: 2.11.0

concurrency:
  group: release-main
  cancel-in-progress: ${{ !contains(github.event.head_commit.message, '[skip release]') }}

jobs:
  checks:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Verify formatting
        run: cargo fmt --all -- --check
      - name: Check generated artifacts
        run: tools/check-generated-artifacts.sh
      - name: Check public secrets
        run: tools/check-public-secrets.sh
      - name: Check version sync
        run: tools/check-version-sync.sh
      - name: Check external model manifest
        run: python3 tools/check-model-manifest.py
      - name: Test release version tool
        run: python3 -m unittest tools/test_release_version.py
      - name: Test client core
        run: cargo test -p client-core
      - name: Test desktop client
        run: cargo test -p desktop
      - name: Test app shell
        run: cargo test -p app
      - name: Test server without optional engines
        run: cargo test -p server --no-default-features
      - name: Test server app shell
        run: cargo test -p server-app
  ios-check:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - name: Install macOS native server build dependencies
        run: brew install abseil cmake meson ninja pkg-config
      - name: Check iOS simulator Rust target
        run: cargo check -p app --features native --target aarch64-apple-ios-sim
      - name: Check macOS server app native release features
        working-directory: server-app
        run: cargo check --features macos-release-native

  version:
    needs: [checks, ios-check]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}
      sha: ${{ steps.release-version.outputs.sha }}
      timestamp: ${{ steps.release-version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply release version
        id: release-version
        run: |
          version="$(python3 tools/release_version.py --apply --print-next | tail -n 1)"
          tools/check-version-sync.sh
          git add Cargo.toml Cargo.lock clients/app/tauri.conf.json clients/bridge-app/tauri.conf.json server-app/tauri.conf.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): v${version} [skip release]"
          fi
          git tag "v${version}"
          git push origin HEAD:main
          git push origin "v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  macos:
    needs: version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      INTERCOM_RELEASE_TAG: ${{ needs.version.outputs.tag }}
      INTERCOM_GIT_SHA: ${{ needs.version.outputs.sha }}
      INTERCOM_BUILD_TIMESTAMP: ${{ needs.version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS native server build dependencies
        run: brew install abseil cmake meson ninja pkg-config
      - name: Build RedLine macOS app
        working-directory: clients/app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles app --ci
      - name: Build RedLine Bridge macOS app
        working-directory: clients/bridge-app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles app --ci
      - name: Build RedLine Server macOS app
        working-directory: server-app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features macos-release-native --bundles app --ci
      - name: Archive macOS apps
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "target/release/bundle/macos/RedLine.app" "artifacts/RedLine-macos-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "target/release/bundle/macos/RedLine Bridge.app" "artifacts/RedLine-Bridge-macos-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "target/release/bundle/macos/RedLine Server.app" "artifacts/RedLine-Server-macos-${VERSION}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-apps
          path: artifacts/*

  linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      INTERCOM_RELEASE_TAG: ${{ needs.version.outputs.tag }}
      INTERCOM_GIT_SHA: ${{ needs.version.outputs.sha }}
      INTERCOM_BUILD_TIMESTAMP: ${{ needs.version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        timeout-minutes: 20
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build RedLine Linux bundles
        working-directory: clients/app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles appimage deb --ci
      - name: Build RedLine Bridge Linux bundles
        working-directory: clients/bridge-app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles appimage deb --ci
      - name: Collect Linux artifacts
        run: |
          mkdir -p artifacts
          find target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -exec cp '{}' artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: linux-apps
          path: artifacts/*

  windows:
    needs: version
    runs-on: windows-latest
    env:
      INTERCOM_RELEASE_TAG: ${{ needs.version.outputs.tag }}
      INTERCOM_GIT_SHA: ${{ needs.version.outputs.sha }}
      INTERCOM_BUILD_TIMESTAMP: ${{ needs.version.outputs.timestamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Build RedLine Windows installer
        working-directory: clients/app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles nsis --ci
      - name: Build RedLine Bridge Windows installer
        working-directory: clients/bridge-app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --features native --bundles nsis --ci
      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Get-ChildItem target/release/bundle/nsis -Recurse -Filter *.exe | Copy-Item -Destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: windows-apps
          path: artifacts/*

  android:
    needs: version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      INTERCOM_RELEASE_TAG: ${{ needs.version.outputs.tag }}
      INTERCOM_GIT_SHA: ${{ needs.version.outputs.sha }}
      INTERCOM_BUILD_TIMESTAMP: ${{ needs.version.outputs.timestamp }}
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865
      ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/29.0.14206865
      NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.1" "ndk;29.0.14206865"
      - name: Install cargo-tauri npm shim
        run: |
          mkdir -p "$HOME/.cargo/bin"
          cat > "$HOME/.cargo/bin/cargo-tauri" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "${1:-}" = "tauri" ]; then
            shift
          fi

          project_dir="$PWD"
          while [ "$project_dir" != "/" ]; do
            if [ -f "$project_dir/tauri.conf.json" ] || [ -f "$project_dir/tauri.conf.json5" ] || [ -f "$project_dir/Tauri.toml" ]; then
              cd "$project_dir"
              break
            fi
            project_dir="$(dirname "$project_dir")"
          done

          exec npx --yes "@tauri-apps/cli@${TAURI_CLI_VERSION}" "$@"
          SH
          chmod +x "$HOME/.cargo/bin/cargo-tauri"
      - name: Build Android debug APK
        working-directory: clients/app
        run: npx --yes @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} android build --debug --apk --features native --ci
      - name: Collect Android artifacts
        run: |
          mkdir -p artifacts
          apk_path="$(find clients/app/gen/android/app/build/outputs/apk -type f -name '*.apk' -print | sort | tail -n 1)"
          if [ -z "$apk_path" ]; then
            echo "built Android .apk was not found" >&2
            exit 1
          fi
          cp "$apk_path" "artifacts/Intercom-Suite-android-debug-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/*

  ios:
    needs: version
    runs-on: macos-26
    env:
      VERSION: ${{ needs.version.outputs.version }}
      INTERCOM_RELEASE_TAG: ${{ needs.version.outputs.tag }}
      INTERCOM_GIT_SHA: ${{ needs.version.outputs.sha }}
      INTERCOM_BUILD_TIMESTAMP: ${{ needs.version.outputs.timestamp }}
      IOS_SIGNING_CONFIGURED: ${{ secrets.APPLE_DEVELOPMENT_TEAM != '' && secrets.IOS_CERTIFICATE_P12_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphonesimulator --show-sdk-version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Install cargo-tauri npm shim
        run: |
          mkdir -p "$HOME/.cargo/bin"
          cat > "$HOME/.cargo/bin/cargo-tauri" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "${1:-}" = "tauri" ]; then
            shift
          fi

          project_dir="$PWD"
          while [ "$project_dir" != "/" ]; do
            if [ -f "$project_dir/tauri.conf.json" ] || [ -f "$project_dir/tauri.conf.json5" ] || [ -f "$project_dir/Tauri.toml" ]; then
              cd "$project_dir"
              break
            fi
            project_dir="$(dirname "$project_dir")"
          done

          exec npx --yes "@tauri-apps/cli@${TAURI_CLI_VERSION}" "$@"
          SH
          chmod +x "$HOME/.cargo/bin/cargo-tauri"
      - name: Build iOS simulator app
        working-directory: clients/app
        run: ./scripts/ios-build-sim.sh
      - name: Collect iOS simulator artifact
        run: |
          mkdir -p artifacts
          app_path="$(
            find clients/app/gen/apple/build -path '*/.stale/*' -prune -o -type d -name '*.app' -print |
              sort |
              tail -n 1
          )"
          if [ -z "$app_path" ]; then
            echo "built iOS simulator .app was not found" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "artifacts/Intercom-Suite-ios-simulator-${VERSION}.zip"
      - name: Install iOS signing assets
        if: env.IOS_SIGNING_CONFIGURED == 'true'
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          keychain_path="$RUNNER_TEMP/intercom-ios-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/intercom-ios-signing.p12"
          profile_path="$HOME/Library/MobileDevice/Provisioning Profiles/intercom-suite.mobileprovision"

          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | decode_base64 > "$certificate_path"
          mkdir -p "$(dirname "$profile_path")"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security import "$certificate_path" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
      - name: Build signed iOS IPA
        if: env.IOS_SIGNING_CONFIGURED == 'true'
        working-directory: clients/app
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: ./scripts/ios-device-build.sh
      - name: Collect signed iOS IPA
        if: env.IOS_SIGNING_CONFIGURED == 'true'
        run: |
          ipa_path="$(find clients/app/gen/apple/build -type f -name '*.ipa' -print | sort | tail -n 1)"
          if [ -z "$ipa_path" ]; then
            echo "signed iOS .ipa was not found" >&2
            exit 1
          fi
          cp "$ipa_path" "artifacts/Intercom-Suite-ios-${VERSION}.ipa"
      - name: Add iOS signing setup note
        if: env.IOS_SIGNING_CONFIGURED != 'true'
        run: |
          mkdir -p artifacts
          cat > "artifacts/Intercom-Suite-ios-device-signing-required-${VERSION}.txt" <<EOF
          This release includes Intercom-Suite-ios-simulator-${VERSION}.zip for simulator installs.

          A physical-device iPhone/iPad IPA was not produced because the repository
          does not have all required Apple signing secrets configured:

          - APPLE_DEVELOPMENT_TEAM
          - IOS_CERTIFICATE_P12_BASE64
          - IOS_CERTIFICATE_PASSWORD
          - IOS_PROVISIONING_PROFILE_BASE64

          Add those secrets with an Apple Development or Ad Hoc signing certificate
          and a provisioning profile for com.intercomsuite.client to publish a
          GitHub-release IPA that can be installed on provisioned devices.
          EOF
      - name: Remove iOS signing keychain
        if: always() && env.IOS_SIGNING_CONFIGURED == 'true'
        run: security delete-keychain "$RUNNER_TEMP/intercom-ios-signing.keychain-db" || true
      - uses: actions/upload-artifact@v4
        with:
          name: ios-client
          path: artifacts/*

  publish:
    needs: [version, macos, linux, windows, android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: gh release create "$TAG" release-artifacts/* --repo "$GITHUB_REPOSITORY" --title "RedLine $TAG" --generate-notes
