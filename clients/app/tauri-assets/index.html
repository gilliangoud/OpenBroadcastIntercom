<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RedLine</title>
    <style>
      :root {
        color-scheme: light;
        --font-ui: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f4f6f8;
        --ink: #17202b;
        --muted: #637083;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font: 15px/1.45 var(--font-ui);
      }
      main {
        width: min(100%, 32rem);
        padding: 2rem;
      }
      img {
        width: min(260px, 75vw);
        height: auto;
        margin-bottom: 0.75rem;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="branding/redline-logo.png" alt="RedLine" />
      <p>The native shell loads the running local client UI at startup.</p>
    </main>
  </body>
</html>
