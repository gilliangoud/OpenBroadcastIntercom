<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RedLine Setup</title>
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="topbar">
        <div class="title-block">
          <div class="title-row">
            <img class="brand-logo" src="branding/redline-logo.png" alt="RedLine" />
            <button id="close-config" type="button" disabled>Close</button>
          </div>
          <span id="status" class="tag offline">stopped</span>
        </div>
      </header>
      <p id="message" class="hint top-message" aria-live="polite"></p>

      <section class="channels-panel server-panel">
        <div class="section-title">
          <h2>Servers</h2>
          <button id="scan-servers" type="button">Scan</button>
        </div>
        <div class="server-picker">
          <select id="server-picker" aria-label="Discovered or saved servers"></select>
        </div>
        <label id="manual-server-row" class="manual-server" hidden>
          Server Host
          <input id="server_host" autocomplete="off" inputmode="url" placeholder="192.168.1.10" />
        </label>
        <p id="server-list-status" class="hint">Scan local network servers or choose Manual.</p>
      </section>

      <section class="channels-panel">
        <div class="section-title">
          <h2>Audio</h2>
        </div>

        <form id="mobile-form" class="config-form">
          <label id="opus-profile-row">
            Quality
            <select id="opus_profile">
              <option value="speech_16_low">Low</option>
              <option value="speech_24_standard">Standard</option>
              <option value="speech_48_high">High</option>
              <option value="music_48">Music</option>
            </select>
          </label>
          <label>
            Mic Gain <output id="mic_gain_value"></output>
            <input id="mic_gain" type="range" min="0" max="2" step="0.05" />
          </label>
          <label>
            Speaker Gain <output id="speaker_gain_value"></output>
            <input id="speaker_gain" type="range" min="0" max="2" step="0.05" />
          </label>
          <label>
            Button Count
            <input id="button_count" type="number" min="0" max="24" step="1" inputmode="numeric" />
          </label>
        </form>
      </section>

      <div class="bottom-dock">
        <div class="bottom-controls">
          <button id="start" class="control-button talk-button-main" type="submit" form="mobile-form">Connect</button>
        </div>
      </div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
