<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RedLine Setup</title>
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="topbar">
        <div>
          <img class="brand-logo" src="branding/redline-logo.png" alt="RedLine" />
          <span id="status" class="tag offline">stopped</span>
        </div>
        <div class="top-actions">
          <button id="save" type="button">Save</button>
          <button id="open-controls" type="button" disabled>Controls</button>
          <button id="close-config" type="button" disabled>Close</button>
        </div>
      </header>

      <section class="channels-panel server-panel">
        <div class="section-title">
          <h2>Servers</h2>
          <button id="scan-servers" type="button">Scan</button>
        </div>
        <div class="server-picker">
          <select id="server-picker" aria-label="Discovered or saved servers"></select>
          <button id="forget-server" type="button" disabled>Forget</button>
        </div>
        <p id="server-list-status" class="hint">Saved and discovered LAN servers appear here.</p>
      </section>

      <section class="channels-panel">
        <div class="section-title">
          <h2>Connection</h2>
        </div>

        <form id="mobile-form" class="config-form">
          <label class="wide">
            Server Audio
            <input id="server" autocomplete="off" inputmode="numeric" placeholder="192.168.1.10:40000" />
          </label>
          <label class="wide">
            Control WebSocket
            <input id="control" autocomplete="off" inputmode="url" placeholder="ws://192.168.1.10:40001" />
          </label>
          <label>
            User ID
            <input id="user_id" type="number" min="1" max="65535" inputmode="numeric" />
          </label>
          <label>
            Codec
            <select id="codec">
              <option value="pcm16">PCM16</option>
              <option value="pcm24">PCM24</option>
              <option value="pcm48">PCM48</option>
              <option value="opus">Opus</option>
            </select>
          </label>
          <label id="opus-profile-row">
            Opus Profile
            <select id="opus_profile">
              <option value="speech_16_low">Speech 16 low</option>
              <option value="speech_24_standard">Speech 24 standard</option>
              <option value="speech_48_high">Speech 48 high</option>
              <option value="music_48">Music 48</option>
            </select>
          </label>
          <label>
            Listen Channel
            <input id="listen_channel" type="number" min="1" max="65535" inputmode="numeric" />
          </label>
          <label>
            TX Channel
            <input id="tx_channel" type="number" min="1" max="65535" inputmode="numeric" />
          </label>
          <label>
            Mic Gain
            <input id="mic_gain" type="number" min="0" max="8" step="0.05" inputmode="decimal" />
          </label>
          <label>
            Speaker Gain
            <input id="speaker_gain" type="number" min="0" max="8" step="0.05" inputmode="decimal" />
          </label>
          <label class="wide">
            Buttons
            <input id="buttons" autocomplete="off" placeholder="director=Director,pa=PA" />
          </label>
          <label class="wide">
            Button Keys
            <input id="button_keys" autocomplete="off" placeholder="director=d" />
          </label>
        </form>
      </section>

      <p id="message" class="hint"></p>

      <div class="bottom-dock">
        <div class="bottom-controls">
          <button id="stop" class="control-button mute-button" type="button">Stop</button>
          <button id="start" class="control-button talk-button-main" type="submit" form="mobile-form">Start</button>
        </div>
      </div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
