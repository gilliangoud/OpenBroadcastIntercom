<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intercom Suite Mobile</title>
    <link rel="stylesheet" href="mobile.css" />
  </head>
  <body>
    <main class="phone-shell">
      <header class="topbar">
        <div>
          <h1>Intercom Suite</h1>
          <span id="status" class="tag offline">stopped</span>
        </div>
        <div class="top-actions">
          <button id="save" type="button">Save</button>
          <button id="open-controls" type="button" disabled>Controls</button>
          <button id="close-config" type="button" disabled>Close</button>
        </div>
      </header>
      <p id="message" class="hint top-message" aria-live="polite"></p>

      <section class="channels-panel server-panel">
        <div class="section-title">
          <h2>Servers</h2>
          <button id="scan-servers" type="button">Scan</button>
        </div>
        <div class="server-picker">
          <select id="server-picker" aria-label="Discovered or saved servers"></select>
          <button id="forget-server" type="button" disabled>Forget</button>
        </div>
        <p id="server-list-status" class="hint">Saved and discovered LAN servers appear here.</p>
      </section>

      <section class="channels-panel">
        <div class="section-title">
          <h2>Connection</h2>
        </div>

        <form id="mobile-form" class="config-form">
          <label class="wide">
            Server Host
            <input id="server_host" autocomplete="off" inputmode="url" placeholder="192.168.1.10" />
          </label>
          <label>
            Codec
            <select id="codec">
              <option value="pcm16">PCM16</option>
              <option value="pcm24">PCM24</option>
              <option value="pcm48">PCM48</option>
              <option value="opus">Opus</option>
            </select>
          </label>
          <label id="opus-profile-row">
            Opus Profile
            <select id="opus_profile">
              <option value="speech_16_low">Speech 16 low</option>
              <option value="speech_24_standard">Speech 24 standard</option>
              <option value="speech_48_high">Speech 48 high</option>
              <option value="music_48">Music 48</option>
            </select>
          </label>
          <label>
            Mic Gain <output id="mic_gain_value"></output>
            <input id="mic_gain" type="range" min="0" max="2" step="0.05" />
          </label>
          <label>
            Speaker Gain <output id="speaker_gain_value"></output>
            <input id="speaker_gain" type="range" min="0" max="2" step="0.05" />
          </label>
          <label>
            Button Count
            <input id="button_count" type="number" min="0" max="24" step="1" inputmode="numeric" />
          </label>
          <label class="check wide">
            <input id="advanced_endpoints" type="checkbox" />
            Use custom endpoint URLs
          </label>
          <details id="advanced-connection" class="wide">
            <summary>Advanced Connection</summary>
            <label class="wide">
              Custom Audio Address
              <input id="server" autocomplete="off" inputmode="url" placeholder="192.168.1.10:40000" />
            </label>
            <label class="wide">
              Custom Control WebSocket
              <input id="control" autocomplete="off" inputmode="url" placeholder="ws://192.168.1.10:40001" />
            </label>
            <label class="wide">
              Custom Admin URL
              <input id="admin" autocomplete="off" inputmode="url" placeholder="http://192.168.1.10:40002" />
            </label>
          </details>
        </form>
      </section>

      <div class="bottom-dock">
        <div class="bottom-controls">
          <button id="stop" class="control-button mute-button" type="button">Stop</button>
          <button id="start" class="control-button talk-button-main" type="submit" form="mobile-form">Start</button>
        </div>
      </div>
    </main>
    <script src="mobile.js"></script>
  </body>
</html>
